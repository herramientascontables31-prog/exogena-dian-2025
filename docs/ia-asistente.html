<style>
/* ═══ CSS Variables ═══ */
:root {
  --bg: #0F0B1A;
  --bg-card: #1A1425;
  --bg-card-hover: #221A30;
  --bg-input: #150F22;
  --border: rgba(5, 150, 105, 0.15);
  --border-light: rgba(5, 150, 105, 0.08);
  --purple: #059669;
  --purple-dim: rgba(5, 150, 105, 0.15);
  --purple-glow: rgba(5, 150, 105, 0.3);
  --violet: #34D399;
  --violet-dim: rgba(52, 211, 153, 0.12);
  --text: #E8E0F0;
  --text-dim: #9B8FB8;
  --text-muted: #6B5F80;
  --white: #FEFCFF;
  --red: #EF4444;
  --red-dim: rgba(239, 68, 68, 0.12);
  --green: #22C55E;
  --amber: #F59E0B;
  --r: 14px;
}
/* ═══ Reset ═══ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
}
/* ═══ Header ═══ */
.chat-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  background: rgba(15, 11, 26, 0.95);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}
.chat-header .back-link {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-dim);
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 500;
  transition: color 0.2s;
  flex-shrink: 0;
}
.chat-header .back-link:hover { color: var(--purple); }
.chat-header .back-link svg { width: 18px; height: 18px; }
.header-divider {
  width: 1px;
  height: 24px;
  background: var(--border);
  flex-shrink: 0;
}
.header-title {
  font-family: 'Outfit', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--white);
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-title .icon-ai {
  width: 22px; height: 22px;
  background: linear-gradient(135deg, var(--purple), #34D399);
  border-radius: 6px;
  display: grid;
  place-items: center;
  font-size: 0.7rem;
  flex-shrink: 0;
}
.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}
.limit-badge {
  font-size: 0.75rem;
  color: var(--text-muted);
  background: var(--violet-dim);
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
}
.limit-badge.pro {
  color: var(--purple);
  background: var(--purple-dim);
  font-weight: 600;
}
.btn-new-chat {
  display: flex;
  align-items: center;
  gap: 5px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.8rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-new-chat:hover {
  border-color: var(--purple);
  color: var(--purple);
  background: var(--purple-dim);
}
.btn-new-chat svg { width: 14px; height: 14px; }
/* ═══ Chat Layout ═══ */
.chat-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.messages-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}
.messages-area::-webkit-scrollbar { width: 5px; }
.messages-area::-webkit-scrollbar-track { background: transparent; }
.messages-area::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 10px;
}
.messages-area::-webkit-scrollbar-thumb:hover {
  background: rgba(5, 150, 105, 0.3);
}
/* ═══ Messages ═══ */
.msg-row {
  display: flex;
  max-width: 780px;
  width: 100%;
  margin: 0 auto;
  animation: msgIn 0.3s ease;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg-row.user { justify-content: flex-end; }
.msg-row.assistant { justify-content: flex-start; }
.msg-row.system { justify-content: center; }
.msg-bubble {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 0.925rem;
  line-height: 1.65;
  word-break: break-word;
}
.msg-row.user .msg-bubble {
  background: linear-gradient(135deg, var(--purple), #047857);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg-row.assistant .msg-bubble {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  border-bottom-left-radius: 4px;
}
.msg-row.system .msg-bubble {
  background: var(--red-dim);
  border: 1px solid rgba(239, 68, 68, 0.2);
  color: #FCA5A5;
  font-size: 0.85rem;
  max-width: 90%;
  text-align: center;
}
.msg-row.system .msg-bubble .retry-btn {
  display: inline-block;
  margin-top: 6px;
  color: var(--red);
  background: transparent;
  border: 1px solid rgba(239, 68, 68, 0.3);
  padding: 4px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8rem;
  font-family: inherit;
  transition: all 0.2s;
}
.msg-row.system .msg-bubble .retry-btn:hover {
  background: rgba(239, 68, 68, 0.15);
}
/* Assistant label */
.msg-row.assistant .msg-wrapper { display: flex; flex-direction: column; gap: 0; max-width: 85%; }
.msg-row.assistant .msg-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
  padding-left: 4px;
}
/* Markdown inside assistant messages */
.msg-bubble strong, .msg-bubble b { color: var(--white); font-weight: 600; }
.msg-bubble a { color: var(--violet); text-decoration: underline; text-underline-offset: 2px; }
.msg-bubble a:hover { color: var(--purple); }
.msg-bubble ul, .msg-bubble ol {
  margin: 6px 0 6px 20px;
}
.msg-bubble li { margin-bottom: 4px; }
.msg-bubble p { margin-bottom: 8px; }
.msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble code {
  background: rgba(5, 150, 105, 0.12);
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 0.85em;
  font-family: 'JetBrains Mono', monospace;
}
/* Source chips */
.sources-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
  padding-left: 4px;
}
.source-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--violet-dim);
  color: var(--violet);
  font-size: 0.72rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid rgba(52, 211, 153, 0.15);
  white-space: nowrap;
}
.source-chip svg { width: 11px; height: 11px; opacity: 0.7; }
/* ═══ Welcome ═══ */
.welcome-section {
  max-width: 640px;
  margin: 0 auto;
  text-align: center;
  padding: 40px 16px 20px;
  animation: msgIn 0.5s ease;
}
.welcome-icon {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--purple), #34D399);
  border-radius: 18px;
  display: grid;
  place-items: center;
  margin: 0 auto 16px;
  font-size: 1.8rem;
  box-shadow: 0 8px 32px var(--purple-glow);
}
.welcome-title {
  font-family: 'Outfit', sans-serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 8px;
}
.welcome-text {
  font-size: 0.925rem;
  color: var(--text-dim);
  line-height: 1.6;
  margin-bottom: 24px;
}
.example-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.example-chip {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 0.82rem;
  padding: 8px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
  text-align: left;
  line-height: 1.4;
}
.example-chip:hover {
  border-color: var(--purple);
  background: var(--bg-card-hover);
  color: var(--white);
  transform: translateY(-1px);
}
/* ═══ Typing Indicator ═══ */
.typing-indicator {
  display: flex;
  gap: 5px;
  padding: 14px 18px;
}
.typing-indicator span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
  animation: typeBounce 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
@keyframes typeBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}
/* ═══ Input Area ═══ */
.input-area {
  flex-shrink: 0;
  padding: 12px 16px 16px;
  background: rgba(15, 11, 26, 0.95);
  border-top: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.input-wrapper {
  max-width: 780px;
  margin: 0 auto;
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.input-field {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.925rem;
  line-height: 1.5;
  resize: none;
  outline: none;
  transition: border-color 0.2s;
  max-height: 96px; /* ~3 lines */
  overflow-y: auto;
}
.input-field::placeholder { color: var(--text-muted); }
.input-field:focus { border-color: var(--purple); }
.input-field::-webkit-scrollbar { width: 4px; }
.input-field::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
.btn-send {
  width: 44px;
  height: 44px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--purple), #047857);
  color: #fff;
  cursor: pointer;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  transition: all 0.2s;
}
.btn-send:hover:not(:disabled) {
  transform: scale(1.05);
  box-shadow: 0 4px 16px var(--purple-glow);
}
.btn-send:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.btn-send svg { width: 20px; height: 20px; }
.input-hint {
  max-width: 780px;
  margin: 6px auto 0;
  font-size: 0.7rem;
  color: var(--text-muted);
  text-align: center;
}
/* ═══ Limit Banner ═══ */
.limit-banner {
  max-width: 780px;
  margin: 0 auto 10px;
  background: var(--purple-dim);
  border: 1px solid rgba(5, 150, 105, 0.2);
  border-radius: 10px;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.85rem;
  color: var(--violet);
  animation: msgIn 0.3s ease;
}
.limit-banner a {
  color: var(--purple);
  font-weight: 600;
  text-decoration: underline;
  white-space: nowrap;
}
/* ═══ Mobile ═══ */
@media (max-width: 640px) {
  .chat-header { padding: 10px 14px; gap: 8px; }
  .header-title { font-size: 0.92rem; }
  .header-divider { display: none; }
  .btn-new-chat span { display: none; }
  .btn-new-chat { padding: 6px 8px; }
  .limit-badge { font-size: 0.7rem; padding: 3px 8px; }
  .messages-area { padding: 14px 10px; gap: 12px; }
  .msg-bubble { max-width: 92%; font-size: 0.875rem; }
  .msg-row.assistant .msg-wrapper { max-width: 92%; }
  .welcome-section { padding: 24px 10px 16px; }
  .welcome-title { font-size: 1.15rem; }
  .welcome-icon { width: 52px; height: 52px; font-size: 1.4rem; border-radius: 14px; }
  .example-chip { font-size: 0.78rem; padding: 7px 11px; }
  .input-area { padding: 10px 10px 14px; }
  .input-field { padding: 10px 14px; font-size: 0.875rem; }
}
</style>
</head>
<body>

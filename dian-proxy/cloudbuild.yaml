# Google Cloud Build — Deploy a Cloud Run
# Ejecutar: gcloud builds submit --config cloudbuild.yaml
# O deploy directo: gcloud run deploy dian-proxy --source . --region southamerica-east1

steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/dian-proxy', '.']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/dian-proxy']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'dian-proxy'
      - '--image'
      - 'gcr.io/$PROJECT_ID/dian-proxy'
      - '--region'
      - 'southamerica-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '120'
      - '--concurrency'
      - '80'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '50'
      - '--set-env-vars'
      - 'ALLOWED_ORIGINS=https://exogenadian.com'

images:
  - 'gcr.io/$PROJECT_ID/dian-proxy'

timeout: '600s'
